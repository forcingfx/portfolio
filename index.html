<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Arjun — Writing</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header><h1>Arjun — Writing</h1></header>
  <main>
    <ul id="posts"></ul>
  </main>
  <footer>© <span id="year"></span> Arjun Muralidharan</footer>

  <script>
    // Load the post list with basic error handling
    (async function loadPosts() {
      const ul = document.getElementById('posts');
      try {
        const res = await fetch('posts.json');
        if (!res.ok) throw new Error(`Failed to fetch posts.json: ${res.status}`);
        const posts = await res.json();

        if (!Array.isArray(posts) || posts.length === 0) {
          ul.innerHTML = '<li>No posts found.</li>';
          return;
        }

        posts
          .sort((a,b) => new Date(b.date) - new Date(a.date))
          .forEach(p => {
            const li = document.createElement('li');
            li.innerHTML = `
              <a href="article.html?post=${encodeURIComponent(p.slug)}">${p.title}</a>
              <time datetime="${p.date}">${new Date(p.date).toLocaleDateString()}</time>
            `;
            ul.appendChild(li);
          });
      } catch (err) {
        console.error('Failed to load posts:', err);
        ul.innerHTML = '<li>Could not load posts.</li>';
      }
    })();

    // set dynamic year in footer
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
