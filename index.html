<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Arjun — Writing</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header><h1>Arjun — Writing</h1></header>
  <main>
    <ul id="posts"></ul>
  </main>
  <footer>© <span id="year"></span> Arjun</footer>

  <script>
    // Load the post list
    fetch('posts.json').then(r => r.json()).then(posts => {
      const ul = document.getElementById('posts');
      posts
        .sort((a,b) => new Date(b.date) - new Date(a.date))
        .forEach(p => {
          const li = document.createElement('li');
          li.innerHTML = `
            <a href="article.html?post=${encodeURIComponent(p.slug)}">${p.title}</a>
            <time datetime="${p.date}">${new Date(p.date).toLocaleDateString()}</time>
          `;
          ul.appendChild(li);
        });
    });
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
